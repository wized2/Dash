    <style>
        /* Your existing CSS here - unchanged */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        /* GREEN LIGHT THEME - From GreenLight.kt */
        :root {
            --md-sys-color-primary: #00691B;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #00E445;
            --md-sys-color-on-primary-container: #005313;
            --md-sys-color-inverse-primary: #00E546;
            --md-sys-color-secondary: #3E624C;
            --md-sys-color-on-secondary: #FFFFFF;
            --md-sys-color-secondary-container: #A7CEB4;
            --md-sys-color-on-secondary-container: #2A4E3A;
            --md-sys-color-tertiary: #206554;
            --md-sys-color-on-tertiary: #FFFFFF;
            --md-sys-color-tertiary-container: #8FD2BD;
            --md-sys-color-on-tertiary-container: #005141;
            --md-sys-color-background: #F3FCEC;
            --md-sys-color-on-background: #161E14;
            --md-sys-color-surface: #F3FCEC;
            --md-sys-color-on-surface: #161E14;
            --md-sys-color-surface-variant: #DAE6D4;
            --md-sys-color-on-surface-variant: #3F4A3C;
            --md-sys-color-surface-tint: #006E1C;
            --md-sys-color-inverse-surface: #2A3328;
            --md-sys-color-inverse-on-surface: #EAF4E4;
            --md-sys-color-error: #B41517;
            --md-sys-color-on-error: #FFFFFF;
            --md-sys-color-error-container: #FFB1A8;
            --md-sys-color-on-error-container: #93000A;
            --md-sys-color-outline: #6E796A;
            --md-sys-color-outline-variant: #BCC9B7;
            --md-sys-color-surface-bright: #F3FCEC;
            --md-sys-color-surface-dim: #D2DBCC;
            --md-sys-color-surface-container: #E7F0E1;
            --md-sys-color-surface-container-high: #E1EADA;
            --md-sys-color-surface-container-highest: #DAE4D4;
            --md-sys-color-surface-container-low: #EDF6E7;
            --md-sys-color-surface-container-lowest: #FFFFFF;
            
            /* Motion tokens */
            --motion-easing-elastic: cubic-bezier(0.68, -0.55, 0.32, 1.55);
            --motion-easing-emphasized: cubic-bezier(0.2, 0, 0, 1);
            --motion-duration-short: 200ms;
            --motion-duration-medium: 400ms;
            
            /* Spacing */
            --button-gap: max(8px, min(1.5vw, 12px));
            --display-padding: clamp(20px, 6vh, 40px);
        }

        /* GREEN DARK THEME - From GreenDark.kt */
        .dark-theme {
            --md-sys-color-primary: #00E546;
            --md-sys-color-on-primary: #00390A;
            --md-sys-color-primary-container: #005313;
            --md-sys-color-on-primary-container: #70FF77;
            --md-sys-color-inverse-primary: #006E1C;
            --md-sys-color-secondary: #A8D0B5;
            --md-sys-color-on-secondary: #133724;
            --md-sys-color-secondary-container: #2A4E3A;
            --md-sys-color-on-secondary-container: #C3ECD0;
            --md-sys-color-tertiary: #91D4BE;
            --md-sys-color-on-tertiary: #00382C;
            --md-sys-color-tertiary-container: #005141;
            --md-sys-color-on-tertiary-container: #ACF0DA;
            --md-sys-color-background: #0E150C;
            --md-sys-color-on-background: #DCE5D6;
            --md-sys-color-surface: #0E150C;
            --md-sys-color-on-surface: #DCE5D6;
            --md-sys-color-surface-variant: #3F4A3C;
            --md-sys-color-on-surface-variant: #BECAB8;
            --md-sys-color-surface-tint: #00E546;
            --md-sys-color-inverse-surface: #DCE5D6;
            --md-sys-color-inverse-on-surface: #2A3328;
            --md-sys-color-error: #FFB4AB;
            --md-sys-color-on-error: #690005;
            --md-sys-color-error-container: #93000A;
            --md-sys-color-on-error-container: #FFDAD6;
            --md-sys-color-outline: #889484;
            --md-sys-color-outline-variant: #3F4A3C;
            --md-sys-color-surface-bright: #343D32;
            --md-sys-color-surface-dim: #0E150C;
            --md-sys-color-surface-container: #1A2219;
            --md-sys-color-surface-container-high: #252D23;
            --md-sys-color-surface-container-highest: #2F382D;
            --md-sys-color-surface-container-low: #161E14;
            --md-sys-color-surface-container-lowest: #080F07;
        }

        html, body {
            height: 100%;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: var(--md-sys-color-background);
            font-family: 'Google Sans', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background-color var(--motion-duration-medium) var(--motion-easing-emphasized);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* FULL SCREEN CALCULATOR */
        .calculator {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            transition: all var(--motion-duration-medium) var(--motion-easing-emphasized);
            position: relative;
        }

        /* Top gradient edge */
        .calculator::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, 
                var(--md-sys-color-primary-container), 
                var(--md-sys-color-primary),
                var(--md-sys-color-tertiary),
                var(--md-sys-color-primary-container));
            z-index: 10;
            opacity: 0.8;
        }

        /* DISPLAY SECTION */
        .display-section {
            flex: 1;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--display-padding);
            background-color: var(--md-sys-color-surface);
            position: relative;
            overflow: hidden;
        }

        /* ROUNDED SEPARATOR LINE - Rounded inward toward display */
        .display-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 16px;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent,
                var(--md-sys-color-outline-variant) 15%,
                var(--md-sys-color-outline) 50%,
                var(--md-sys-color-outline-variant) 85%,
                transparent);
            border-radius: 24px 24px 0 0;
            opacity: 0.5;
        }

        /* Background overlay */
        .display-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at top right, 
                var(--md-sys-color-primary-container) 0%, 
                transparent 70%);
            opacity: 0.08;
            pointer-events: none;
        }

        .previous-operand {
            font-size: clamp(24px, 5vw, 32px);
            color: var(--md-sys-color-on-surface-variant);
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
            line-height: 1.3;
            margin-bottom: 12px;
            opacity: 0.8;
        }

        .current-operand {
            font-size: clamp(72px, 15vw, 120px);
            color: var(--md-sys-color-on-surface);
            font-weight: 500;
            line-height: 1.1;
            text-align: right;
            letter-spacing: -1px;
            word-break: break-all;
            overflow-wrap: break-word;
            transition: all var(--motion-duration-short) var(--motion-easing-elastic);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        /* BUTTONS SECTION */
        .buttons-section {
            padding: clamp(16px, 4vh, 24px);
            background-color: var(--md-sys-color-surface);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--button-gap);
            max-width: 600px;
            margin: 0 auto;
        }

        /* BUTTON STYLES */
        .btn {
            aspect-ratio: 1/1;
            width: 100%;
            border: none;
            border-radius: 9999px;
            font-size: clamp(28px, 7vw, 36px);
            font-family: 'Google Sans', system-ui, sans-serif;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all var(--motion-duration-short) var(--motion-easing-elastic);
            user-select: none;
            position: relative;
            overflow: hidden;
            background: transparent;
            touch-action: manipulation;
            padding: 0;
            color: var(--md-sys-color-on-surface);
        }

        .btn:active {
            transform: scale(0.92);
        }

        /* Button variants with green colors */
        .btn-number {
            background-color: var(--md-sys-color-surface-container-high);
        }

        .btn-number:active {
            background-color: var(--md-sys-color-surface-container-highest);
        }

        .btn-operator {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            font-weight: 600;
            font-size: clamp(32px, 8vw, 40px);
        }

        .btn-operator:active {
            background-color: var(--md-sys-color-secondary);
            color: var(--md-sys-color-on-secondary);
        }

        .btn-equals {
            background: linear-gradient(145deg, 
                var(--md-sys-color-primary), 
                var(--md-sys-color-tertiary));
            color: var(--md-sys-color-on-primary);
            font-weight: 700;
            font-size: clamp(36px, 8.5vw, 44px);
        }

        .btn-theme {
            background-color: var(--md-sys-color-tertiary-container);
            color: var(--md-sys-color-on-tertiary-container);
        }

        .btn-theme:active {
            background-color: var(--md-sys-color-tertiary);
            color: var(--md-sys-color-on-tertiary);
        }

        .btn-clear, .btn-delete, .btn-percent {
            background-color: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-on-surface-variant);
        }

        /* Material Symbols */
        .material-symbols-rounded {
            font-family: 'Material Symbols Rounded', sans-serif;
            font-weight: 400;
            font-size: clamp(32px, 8vw, 40px);
            font-variation-settings: 'FILL' 0, 'wght' 500;
        }

        .btn-equals .material-symbols-rounded {
            font-size: clamp(40px, 9vw, 48px);
            font-variation-settings: 'FILL' 1, 'wght' 600;
        }

        /* Animation */
        @keyframes number-pop {
            0% { transform: scale(1); }
            30% { transform: scale(1.02); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        .number-updated {
            animation: number-pop 0.2s var(--motion-easing-elastic);
        }

        /* Responsive */
        @media (min-width: 600px) {
            .buttons-section { padding: 28px; }
            .buttons-grid { gap: 16px; }
            .display-section::after { left: 24px; right: 24px; }
        }

        @media (orientation: landscape) and (max-height: 600px) {
            .display-section { min-height: 140px; padding: 16px 20px; }
            .current-operand { font-size: clamp(56px, 10vh, 80px); }
            .display-section::after { left: 12px; right: 12px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; animation: none !important; }
        }
    </style>
</head>
