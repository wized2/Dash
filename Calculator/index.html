        .display-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at top right, var(--md-sys-color-primary-container) 0%, transparent 70%); opacity: 0.08; pointer-events: none; }
        .previous-operand { font-size: clamp(24px, 5vw, 32px); color: var(--md-sys-color-on-surface-variant); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 400; line-height: 1.3; margin-bottom: 12px; opacity: 0.8; }
        .current-operand { font-size: clamp(72px, 15vw, 120px); color: var(--md-sys-color-on-surface); font-weight: 500; line-height: 1.1; text-align: right; letter-spacing: -1px; word-break: break-all; overflow-wrap: break-word; transition: all var(--motion-duration-short) var(--motion-easing-elastic); text-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); }
        .buttons-section { padding: clamp(16px, 4vh, 24px); background-color: var(--md-sys-color-surface); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .buttons-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--button-gap); max-width: 600px; margin: 0 auto; }
        .btn { aspect-ratio: 1/1; width: 100%; border: none; border-radius: 9999px; font-size: clamp(28px, 7vw, 36px); font-family: 'Google Sans', system-ui, sans-serif; font-weight: 500; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all var(--motion-duration-short) var(--motion-easing-elastic); user-select: none; position: relative; overflow: hidden; background: transparent; touch-action: manipulation; padding: 0; color: var(--md-sys-color-on-surface); }
        .btn:active { transform: scale(0.92); }

        .btn-number:active { background-color: var(--md-sys-color-surface-container-highest); }
        .btn-operator { background-color: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); font-weight: 600; font-size: clamp(32px, 8vw, 40px); }
        .btn-operator:active { background-color: var(--md-sys-color-secondary); color: var(--md-sys-color-on-secondary); }
        .btn-equals { background: linear-gradient(145deg, var(--md-sys-color-primary), var(--md-sys-color-tertiary)); color: var(--md-sys-color-on-primary); font-weight: 700; font-size: clamp(36px, 8.5vw, 44px); }
        .btn-theme { background-color: var(--md-sys-color-tertiary-container); color: var(--md-sys-color-on-tertiary-container); }
        .btn-theme:active { background-color: var(--md-sys-color-tertiary); color: var(--md-sys-color-on-tertiary); }
        .btn-clear, .btn-delete, .btn-percent { background-color: var(--md-sys-color-surface-variant); color: var(--md-sys-color-on-surface-variant); }
        .material-symbols-rounded { font-family: 'Material Symbols Rounded', sans-serif; font-weight: 400; font-size: clamp(32px, 8vw, 40px); font-variation-settings: 'FILL' 0, 'wght' 500; }
        .btn-equals .material-symbols-rounded { font-size: clamp(40px, 9vw, 48px); font-variation-settings: 'FILL' 1, 'wght' 600; }
        @keyframes number-pop { 0% { transform: scale(1); } 30% { transform: scale(1.02); opacity: 0.9; } 100% { transform: scale(1); opacity: 1; } }
        .number-updated { animation: number-pop 0.2s var(--motion-easing-elastic); }
        @media (min-width: 600px) { .buttons-section { padding: 28px; } .buttons-grid { gap: 16px; } .display-section::after { left: 24px; right: 24px; } }
        @media (orientation: landscape) and (max-height: 600px) { .display-section { min-height: 140px; padding: 16px 20px; } .current-operand { font-size: clamp(56px, 10vh, 80px); } .display-section::after { left: 12px; right: 12px; } }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

<body class="light-theme">

<div class="calculator">
    <div class="display-section">
        <div class="previous-operand" id="previous-operand"></div>
        <div class="current-operand" id="current-operand">0</div>
    </div>

    <div class="buttons-section">
        <div class="buttons-grid">
            <!-- Row 1 -->
            <button class="btn btn-clear" data-action="clear"><span class="material-symbols-rounded">delete_sweep</span></button>
            <button class="btn btn-delete" data-action="delete"><span class="material-symbols-rounded">backspace</span></button>
            <button class="btn btn-percent" data-action="percent"><span class="percent-symbol">%</span></button>
            <button class="btn btn-operator" data-action="operation" data-value="÷"><span class="divide-symbol">÷</span></button>

            <!-- Row 2 -->
            <button class="btn btn-number" data-action="number" data-value="7">7</button>
            <button class="btn btn-number" data-action="number" data-value="8">8</button>
            <button class="btn btn-number" data-action="number" data-value="9">9</button>
            <button class="btn btn-operator" data-action="operation" data-value="×"><span class="material-symbols-rounded">close</span></button>

            <!-- Row 3 -->
            <button class="btn btn-number" data-action="number" data-value="4">4</button>
            <button class="btn btn-number" data-action="number" data-value="5">5</button>
            <button class="btn btn-number" data-action="number" data-value="6">6</button>
            <button class="btn btn-operator" data-action="operation" data-value="−"><span class="material-symbols-rounded">remove</span></button>

            <!-- Row 4 -->
            <button class="btn btn-number" data-action="number" data-value="1">1</button>
            <button class="btn btn-number" data-action="number" data-value="2">2</button>
            <button class="btn btn-number" data-action="number" data-value="3">3</button>
            <button class="btn btn-operator" data-action="operation" data-value="+"><span class="material-symbols-rounded">add</span></button>

            <!-- Row 5 -->
            <button class="btn btn-number" data-action="decimal" data-value=".">.</button>
            <button class="btn btn-number" data-action="number" data-value="0">0</button>
            <button class="btn btn-theme" data-action="theme-switch" id="theme-switch-btn"><span class="material-symbols-rounded" id="theme-icon">light_mode</span></button>
            <button class="btn btn-equals" data-action="equals"><span class="material-symbols-rounded">equal</span></button>
        </div>
    </div>
</div>

<script>
    // Calculator class (unchanged)
    class Calculator {
        constructor(previousOperandTextElement, currentOperandTextElement) {
            this.previousOperandTextElement = previousOperandTextElement;
            this.currentOperandTextElement = currentOperandTextElement;
            this.clear();
        }
        clear() { this.currentOperand = ''; this.previousOperand = ''; this.operation = undefined; this.updateDisplay(); }
        delete() { this.currentOperand = this.currentOperand.toString().slice(0, -1); this.updateDisplay(true); }
        appendNumber(number) { if (number === '.' && this.currentOperand.includes('.')) return; this.currentOperand = this.currentOperand.toString() + number.toString(); this.updateDisplay(true); }
        chooseOperation(operation) { if (this.currentOperand === '') return; if (this.previousOperand !== '') this.compute(); this.operation = operation; this.previousOperand = this.currentOperand; this.currentOperand = ''; this.updateDisplay(); }
        compute() {
            let computation; const prev = parseFloat(this.previousOperand); const current = parseFloat(this.currentOperand);
            if (this.operation === '%') { if (isNaN(current)) return; computation = current / 100; this.previousOperand = ''; this.currentOperand = computation.toString(); this.operation = undefined; this.updateDisplay(true); return; }
            if (isNaN(prev) || isNaN(current)) return;
            switch (this.operation) {
                case '+': computation = prev + current; break;
                case '−': computation = prev - current; break;
                case '×': computation = prev * current; break;
                case '÷': computation = prev / current; break;
                default: return;
            }
            this.currentOperand = parseFloat(computation.toFixed(10)); this.operation = undefined; this.previousOperand = ''; this.updateDisplay(true);
        }
        getDisplayNumber(number) {
            const stringNumber = number.toString(); const integerDigits = parseFloat(stringNumber.split('.')[0]); const decimalDigits = stringNumber.split('.')[1];
            let integerDisplay = isNaN(integerDigits) ? '0' : integerDigits.toLocaleString('en', { maximumFractionDigits: 0 });
            return decimalDigits != null ? `${integerDisplay}.${decimalDigits}` : integerDisplay;
        }
        updateDisplay(animate = false) {
            this.currentOperandTextElement.innerText = this.getDisplayNumber(this.currentOperand) || '0';
            if (this.operation != null && this.previousOperand !== '') {
                this.previousOperandTextElement.innerText = `${this.getDisplayNumber(this.previousOperand)} ${this.operation}`;
            } else {
                this.previousOperandTextElement.innerText = '';
            }
            if (animate) {
                this.currentOperandTextElement.classList.add('number-updated');
                setTimeout(() => this.currentOperandTextElement.classList.remove('number-updated'), 200);
            }
        }
    }

    // Theme switching
    const body = document.body;
    const themeButton = document.getElementById('theme-switch-btn');
    const themeIcon = document.getElementById('theme-icon');
    function toggleTheme() {
        if (body.classList.contains('light-theme')) {
            body.classList.remove('light-theme'); body.classList.add('dark-theme'); themeIcon.innerText = 'dark_mode';
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#00E546');
        } else {
            body.classList.remove('dark-theme'); body.classList.add('light-theme'); themeIcon.innerText = 'light_mode';
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#00691B');
        }
    }

    // Initialize calculator
    const previousOperandTextElement = document.getElementById('previous-operand');
    const currentOperandTextElement = document.getElementById('current-operand');
    const calculator = new Calculator(previousOperandTextElement, currentOperandTextElement);
    const buttons = document.querySelectorAll('.btn');
    buttons.forEach(button => {
        button.addEventListener('click', () => {
            const action = button.dataset.action;
            const value = button.dataset.value;
            if (action === 'number' || action === 'decimal') calculator.appendNumber(value || button.innerText);
            else if (action === 'operation') calculator.chooseOperation(value || button.innerText);
            else if (action === 'equals') calculator.compute();
            else if (action === 'clear') calculator.clear();
            else if (action === 'delete') calculator.delete();
            else if (action === 'percent' && calculator.currentOperand !== '') calculator.chooseOperation('%');
            else if (action === 'theme-switch') toggleTheme();
        });
    });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (/[0-9]/.test(key)) calculator.appendNumber(key);
        else if (key === '.') calculator.appendNumber('.');
        else if (key === 'Enter' || key === '=') calculator.compute();
        else if (key === 'Backspace') calculator.delete();
        else if (key === 'Escape') calculator.clear();
        else if (['+', '-', '*', '/'].includes(key)) {
            let op = key;
            if (key === '*') op = '×';
            if (key === '/') op = '÷';
            calculator.chooseOperation(op);
        }
    });

    // Prevent zoom on double tap
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
    }, false);

    // Service worker registration with absolute URL
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("https://endroid.pages.dev/Calculator/service-worker.js")
                .catch(err => console.warn("Service worker registration failed:", err));
        });
    }
</script>
