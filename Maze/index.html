        // Create image from SVG
        const svgBlob = new Blob([svgString], { type: 'image/svg+xml' });
        const svgUrl = URL.createObjectURL(svgBlob);
        const blackHoleImg = new Image();
        blackHoleImg.src = svgUrl;

        // ---- Canvas setup ----
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d', { alpha: false });
        const joystick = document.getElementById('joystick');
        const stick = document.getElementById('stick');
        const winScreen = document.getElementById('winScreen');

        let W, H, cols, rows, cell, maze = [];
        let ball = { x: 0, y: 0, vx: 0, vy: 0, r: 0 },
            goal = { x: 0, y: 0, r: 0 };
        const wallW = 6;
        const accel = 0.4;
        const damping = 0.97;
        const gravity = 0.07;
        const maxVelocity = 10;
        const bounceFactor = 0.3;

        const trail = [];
        const maxTrailLength = 12;

        // ---- Black hole consumption state ----
        let isConsuming = false;
        let consumptionProgress = 0;
        let ballScale = 1;
        let ballAlpha = 1;
        let flashAlpha = 0;
        let blackHoleAngle = 0;
        let ballOriginalR = 0;
        let showWin = false;

        function resize() {
            W = canvas.parentElement.clientWidth;
            H = canvas.parentElement.clientHeight;
            canvas.width = W;
            canvas.height = H;
            const targetCols = Math.max(5, Math.round(W / 56));
            const targetRows = Math.max(5, Math.round(H / 56));
            const pad = 24;
            cell = Math.max(28, Math.floor(Math.min((W - pad * 2) / targetCols, (H - pad * 2) / targetRows)));
            cols = Math.floor((W - pad * 2) / cell);
            rows = Math.floor((H - pad * 2) / cell);
            ball.r = Math.round(cell * 0.28);
            // Make goal a bit bigger than ball
            goal.r = Math.round(ball.r * 1.25); // slightly bigger
            ballOriginalR = ball.r;
            buildMaze();
        }

        function buildMaze() {
            maze = [];
            for (let y = 0; y < rows; y++) { maze[y] = []; for (let x = 0; x < cols; x++) maze[y][x] = { v: false, w: [1, 1, 1,
                        1] }; }
            const stack = [];
            let cx = 0,
                cy = 0;
            maze[0][0].v = true;
            let visited = 1,
                total = cols * rows;
            while (visited < total) {
                const n = [];
                if (cy > 0 && !maze[cy - 1][cx].v) n.push(['up', cx, cy - 1]);
                if (cx < cols - 1 && !maze[cy][cx + 1].v) n.push(['right', cx + 1, cy]);
                if (cy < rows - 1 && !maze[cy + 1][cx].v) n.push(['down', cx, cy + 1]);
                if (cx > 0 && !maze[cy][cx - 1].v) n.push(['left', cx - 1, cy]);
                if (n.length) {
                    const nxt = n[Math.floor(Math.random() * n.length)];
                    const dir = nxt[0],
                        nx = nxt[1],
                        ny = nxt[2];
                    if (dir === 'up') { maze[cy][cx].w[0] = 0;
                        maze[ny][nx].w[2] = 0; }
                    if (dir === 'right') { maze[cy][cx].w[1] = 0;
                        maze[ny][nx].w[3] = 0; }
                    if (dir === 'down') { maze[cy][cx].w[2] = 0;
                        maze[ny][nx].w[0] = 0; }
                    if (dir === 'left') { maze[cy][cx].w[3] = 0;
                        maze[ny][nx].w[1] = 0; }
                    stack.push([cx, cy]);
                    cx = nx;
                    cy = ny;
                    maze[cy][cx].v = true;
                    visited++;
                } else { const p = stack.pop(); if (!p) break;
                    cx = p[0];
                    cy = p[1]; }
            }
            const ox = Math.round((W - cols * cell) / 2);
            const oy = Math.round((H - rows * cell) / 2);
            ball.x = ox + cell / 2;
            ball.y = oy + cell / 2;
            ball.vx = 0;
            ball.vy = 0;
            ball.r = ballOriginalR;
            goal.x = ox + (cols - 0.5) * cell;
            goal.y = oy + (rows - 0.5) * cell;
            trail.length = 0;
            isConsuming = false;
            consumptionProgress = 0;
            ballScale = 1;
            ballAlpha = 1;
            flashAlpha = 0;
            showWin = false;
            winScreen.style.display = 'none';
        }

        // ---- Draw ----
        function draw() {
            ctx.clearRect(0, 0, W, H);
            const ox = Math.round((W - cols * cell) / 2);
            const oy = Math.round((H - rows * cell) / 2);

            // neon walls
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const c = maze[y][x];
                    const sx = ox + x * cell;
                    const sy = oy + y * cell;
                    ctx.strokeStyle = "#0ff";
                    ctx.shadowColor = "#0ff";
                    ctx.shadowBlur = 10;
                    ctx.lineWidth = wallW;
                    if (c.w[0]) { ctx.beginPath();
                        ctx.moveTo(sx, sy);
                        ctx.lineTo(sx + cell, sy);
                        ctx.stroke(); }
                    if (c.w[1]) { ctx.beginPath();
                        ctx.moveTo(sx + cell, sy);
                        ctx.lineTo(sx + cell, sy + cell);
                        ctx.stroke(); }
                    if (c.w[2]) { ctx.beginPath();
                        ctx.moveTo(sx + cell, sy + cell);
                        ctx.lineTo(sx, sy + cell);
                        ctx.stroke(); }
                    if (c.w[3]) { ctx.beginPath();
                        ctx.moveTo(sx, sy + cell);
                        ctx.lineTo(sx, sy);
                        ctx.stroke(); }
                }
            }
            ctx.shadowBlur = 0;

            // ---- Draw spinning SVG black hole ----
            if (blackHoleImg.complete && blackHoleImg.naturalWidth > 0) {
                const size = goal.r * 2.4; // slightly bigger than goal radius
                ctx.save();
                ctx.translate(goal.x, goal.y);
                ctx.rotate(blackHoleAngle);
                ctx.drawImage(blackHoleImg, -size / 2, -size / 2, size, size);
                ctx.restore();
            } else {
                // fallback while loading
                ctx.beginPath();
                ctx.fillStyle = "#141160";
                ctx.arc(goal.x, goal.y, goal.r, 0, 2 * Math.PI);
                ctx.fill();
            }

            // ---- Trail ----
            for (let i = 0; i < trail.length; i++) {
                const p = trail[i];
                const alpha = (i + 1) / trail.length * 0.4;
                ctx.beginPath();
                ctx.fillStyle = `rgba(0,204,255,${alpha})`;
                ctx.shadowColor = "#00ccff";
                ctx.shadowBlur = 10;
                ctx.arc(p.x, p.y, ball.r * 0.9 * ballScale, 0, 2 * Math.PI);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            // ---- Ball ----
            if (!isConsuming || consumptionProgress < 1) {
                const drawR = ball.r * ballScale;
                const alpha = ballAlpha;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.fillStyle = "#00ccff";
                ctx.shadowColor = "#00ccff";
                ctx.shadowBlur = 20;
                ctx.arc(ball.x, ball.y, Math.max(0.5, drawR), 0, 2 * Math.PI);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }

            // ---- Flash effect ----
            if (flashAlpha > 0.01) {
                ctx.fillStyle = `rgba(255,255,255,${flashAlpha * 0.5})`;
                ctx.fillRect(0, 0, W, H);
            }
        }

        // ---- Collision ----
        function collide() {
            const ox = Math.round((W - cols * cell) / 2);
            const oy = Math.round((H - rows * cell) / 2);
            const cx = Math.floor((ball.x - ox) / cell);
            const cy = Math.floor((ball.y - oy) / cell);
            if (cx < 0 || cy < 0 || cx >= cols || cy >= rows) return;
            const c = maze[cy][cx];
            const px = ox + cx * cell,
                py = oy + cy * cell;
            if (c.w[0] && ball.y - ball.r < py) { ball.y = py + ball.r; if (ball.vy < 0) ball.vy = -ball.vy *
                bounceFactor; }
            if (c.w[2] && ball.y + ball.r > py + cell) { ball.y = py + cell - ball.r; if (ball.vy > 0) ball.vy = -ball
                    .vy * bounceFactor; }
            if (c.w[3] && ball.x - ball.r < px) { ball.x = px + ball.r; if (ball.vx < 0) ball.vx = -ball.vx *
                bounceFactor; }
            if (c.w[1] && ball.x + ball.r > px + cell) { ball.x = px + cell - ball.r; if (ball.vx > 0) ball.vx = -ball
                    .vx * bounceFactor; }
        }

        // ---- Update ----
        function update() {
            blackHoleAngle += 0.02; // spin speed

            if (!isConsuming) {
                ball.vy += gravity;
                if (ball.vx > maxVelocity) ball.vx = maxVelocity;
                if (ball.vx < -maxVelocity) ball.vx = -maxVelocity;
                if (ball.vy > maxVelocity) ball.vy = maxVelocity;
                if (ball.vy < -maxVelocity) ball.vy = -maxVelocity;
                ball.x += ball.vx;
                ball.y += ball.vy;
                collide();

                trail.push({ x: ball.x, y: ball.y });
                if (trail.length > maxTrailLength) trail.shift();

                // Check if ball reaches black hole (collision with goal radius)
                const dx = ball.x - goal.x;
                const dy = ball.y - goal.y;
                const dist = Math.hypot(dx, dy);
                const threshold = ball.r + goal.r * 0.6; // slightly inside
                if (dist < threshold && !showWin) {
                    isConsuming = true;
                    consumptionProgress = 0;
                    ballScale = 1;
                    ballAlpha = 1;
                    flashAlpha = 0;
                }
            } else {
                // ---- Consumption animation ----
                consumptionProgress += 0.025;
                if (consumptionProgress > 1) consumptionProgress = 1;

                // Move ball toward center
                const dx = goal.x - ball.x;
                const dy = goal.y - ball.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 0.3) {
                    const speed = 1.8 + consumptionProgress * 4.5;
                    const moveX = (dx / dist) * speed;
                    const moveY = (dy / dist) * speed;
                    ball.x += moveX;
                    ball.y += moveY;
                } else {
                    ball.x = goal.x;
                    ball.y = goal.y;
                }

                // Shrink and fade
                ballScale = Math.max(0.01, 1 - consumptionProgress * 0.98);
                ballAlpha = Math.max(0, 1 - consumptionProgress * 1.05);

                // Flash pulse at the end
                if (consumptionProgress > 0.7) {
                    flashAlpha = Math.max(0, (consumptionProgress - 0.7) / 0.3 * 0.8);
                } else {
                    flashAlpha = 0;
                }

                // Trail during consumption (fading)
                if (trail.length > 0 && consumptionProgress < 0.95) {
                    trail.push({ x: ball.x, y: ball.y });
                    if (trail.length > maxTrailLength) trail.shift();
                }

                // Completion
                if (consumptionProgress >= 1) {
                    showWin = true;
                    winScreen.style.display = 'block';
                    setTimeout(() => {
                        winScreen.style.display = 'none';
                        showWin = false;
                        isConsuming = false;
                        consumptionProgress = 0;
                        ballScale = 1;
                        ballAlpha = 1;
                        flashAlpha = 0;
                        buildMaze();
                    }, 3000);
                }
            }
        }

        // ---- Input ----
        const keys = { up: 0, down: 0, left: 0, right: 0 };
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') keys.up = 1;
            if (e.key === 'ArrowDown' || e.key === 's') keys.down = 1;
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = 1;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = 1;
        });
        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') keys.up = 0;
            if (e.key === 'ArrowDown' || e.key === 's') keys.down = 0;
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = 0;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = 0;
        });

        let stickActive = false;
        let stickCenter = { x: 0, y: 0 };
        stick.addEventListener('pointerdown', e => {
            stickActive = true;
            stickCenter = { x: e.clientX, y: e.clientY };
            stick.setPointerCapture(e.pointerId);
        });
        stick.addEventListener('pointermove', e => {
            if (!stickActive) return;
            let dx = e.clientX - stickCenter.x;
            let dy = e.clientY - stickCenter.y;
            const max = 50;
            let dist = Math.hypot(dx, dy);
            if (dist > max) { dx = dx * max / dist;
                dy = dy * max / dist; }
            stick.style.transform = `translate(${dx}px,${dy}px)`;
            if (!isConsuming) {
                ball.vx += dx / 30;
                ball.vy += dy / 30;
            }
        });
        stick.addEventListener('pointerup', e => {
            stickActive = false;
            stick.style.transform = 'translate(0,0)';
            stick.releasePointerCapture(e.pointerId);
        });

        // ---- Loop ----
        function loop() {
            if (!isConsuming) {
                ball.vx += (keys.right - keys.left) * accel;
                ball.vy += (keys.down - keys.up) * accel;
            }
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', resize);
        resize();
        loop();

        // ---- Service Worker ----
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('https://endroid.pages.dev/Maze/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>

</body>
